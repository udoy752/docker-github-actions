name: Docker Github Actions 

on: 
  pull_request: 
    type: [closed]
    branches: 
      - main 


jobs: 
  docker: 
    if: github.event.pull_request.merged == true 
    runs-on: ubuntu-latest 
    steps: 
      # checkout repository  
      - name: Checkout Repository 
        uses: actions/checkout@v4
      # login to dockerhub  
      - name: Login to Dockerhub 
        uses: docker/login-actions@v3 
        with: 
          username: ${{ secrets.DOCKER_USERNAME }} 
          password: ${{ secrets.DOCKER_PASSWORD }}
      # build Image  
      - name: Build Image 
        run: docker build -t mynginx:test . 
      # test Image 
      - name: Test Docker Image 
        run: | 
          docker run -d -p 8080:80 --name test-nginx mynginx:test 
          sleep 5 
          curl http://localhost:80 | grep "This is a docker lab using nginx" 
          docker stop test-nginx
      # push Image  
      - name: Push To Dockerhub 
        run: | 
          docker tag mynginx:test ${{ secrets.DOCKER_USERNAME }}/mynginx:latest 
          docker push ${{ secrets.DOCKER_USERNAME }}/mynginx:latest 



